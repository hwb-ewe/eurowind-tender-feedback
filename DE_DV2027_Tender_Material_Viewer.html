<html lang="de">
<head>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');

        :root {
            --ewe-dark-blue: #041E42;
            --ewe-sky-blue: #ABCAF6;
            --ewe-white: #FFFFFF;
            --ewe-bg-light: #F9FAFB;
            --ewe-border: #E5E7EB;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            line-height: 1.6;
            color: #374151;
            background: var(--ewe-white);
        }

        header {
            background: var(--ewe-dark-blue);
            color: var(--ewe-white);
            padding: 28px 24px;
            text-align: center;
        }

        h1 {
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 4px;
        }

        .subtitle {
            font-size: 15px;
            opacity: 0.9;
        }

        .tabs {
            display: flex;
            background: var(--ewe-bg-light);
            border-bottom: 2px solid var(--ewe-border);
            padding: 0 40px;
        }

        .tab-button {
            padding: 16px 24px;
            border: none;
            background: none;
            color: #6B7280;
            font-weight: 600;
            cursor: pointer;
            border-bottom: 3px solid transparent;
            transition: all 0.2s;
        }

        .tab-button:hover {
            color: var(--ewe-dark-blue);
        }

        .tab-button.active {
            color: var(--ewe-dark-blue);
            border-bottom-color: var(--ewe-dark-blue);
        }

        .tab-content {
            display: none;
            flex: 1;
            overflow: hidden;
        }

        .tab-content.active {
            display: flex;
            width: 100%;
        }

        .container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 0;
            min-height: calc(100vh - 140px);
            width: 100%;
            flex: 1 1 auto;
            min-width: 0;
        }

        .panel {
            display: flex;
            flex-direction: column;
            overflow: hidden;
            border-right: 1px solid var(--ewe-border);
        }

        .map-container {
            flex: 1;
            overflow: hidden;
            min-width: 0;
            position: relative;
        }

        #map {
            width: 100%;
            height: 100%;
            display: block;
        }

        .custom-marker-icon {
            background: transparent;
            border: none;
        }

        .panel-header {
            padding: 20px;
            background: var(--ewe-bg-light);
            border-bottom: 2px solid var(--ewe-border);
        }

        .tender-tabs {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .tender-tab {
            padding: 8px 12px;
            border: 1px solid var(--ewe-border);
            background: var(--ewe-white);
            color: #374151;
            border-radius: 4px;
            cursor: pointer;
            font-size: 12px;
            font-weight: 600;
            transition: all 0.2s;
        }

        .tender-tab.active {
            background: var(--ewe-dark-blue);
            color: var(--ewe-white);
            border-color: var(--ewe-dark-blue);
        }

        .panel-content {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
        }

        .park-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
        }

        .park-card {
            background: var(--ewe-white);
            border: 1px solid var(--ewe-border);
            border-radius: 6px;
            padding: 12px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .park-card:hover {
            border-color: var(--ewe-dark-blue);
            box-shadow: 0 2px 8px rgba(4, 30, 66, 0.1);
            background: var(--ewe-bg-light);
        }

        .park-name {
            font-size: 13px;
            font-weight: 600;
            color: var(--ewe-dark-blue);
            margin-bottom: 6px;
        }

        .park-meta {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
            font-size: 11px;
            color: #6B7280;
        }

        .tso-badge {
            display: inline-block;
            background: var(--ewe-sky-blue);
            color: var(--ewe-dark-blue);
            padding: 3px 6px;
            border-radius: 2px;
            font-size: 10px;
            font-weight: 600;
        }

        .table-view {
            flex-direction: column;
            width: 100%;
            min-height: calc(100vh - 140px);
        }

        .table-toolbar {
            padding: 16px 40px;
            background: var(--ewe-bg-light);
            border-bottom: 1px solid var(--ewe-border);
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 30;
        }

        .search-box {
            flex: 1;
            padding: 10px 12px;
            border: 1px solid var(--ewe-border);
            border-radius: 4px;
            font-size: 13px;
            max-width: 400px;
        }

        .filter-select {
            padding: 10px 12px;
            border: 1px solid var(--ewe-border);
            border-radius: 4px;
            font-size: 13px;
            background: var(--ewe-white);
            color: #374151;
            min-width: 170px;
        }

        .toolbar-button {
            padding: 10px 14px;
            border: 1px solid var(--ewe-dark-blue);
            background: var(--ewe-white);
            color: var(--ewe-dark-blue);
            border-radius: 4px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        .toolbar-button:hover {
            background: var(--ewe-dark-blue);
            color: var(--ewe-white);
        }

        .table-container {
            flex: 1;
            overflow: auto;
            margin: 0 40px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 11px;
        }

        th {
            background: var(--ewe-dark-blue);
            color: var(--ewe-white);
            padding: 10px;
            text-align: left;
            font-weight: 600;
            position: sticky;
            top: 0;
            cursor: pointer;
            user-select: none;
        }

        th:hover {
            background: #0a2d52;
        }

        td {
            padding: 8px 10px;
            border-bottom: 1px solid var(--ewe-border);
        }

        tr:hover {
            background: var(--ewe-bg-light);
        }

        tr.u20-2027-row {
            background: #fffbf0;
            border-left: 3px solid #F8B323;
        }

        .mastr-id {
            font-family: 'Courier New', monospace;
            background: var(--ewe-bg-light);
            padding: 2px 4px;
            border-radius: 2px;
            font-size: 9px;
        }

        .age-badge {
            display: inline-block;
            padding: 3px 6px;
            border-radius: 2px;
            font-size: 9px;
            font-weight: 600;
        }

        .age-badge.u20-orange {
            background: #FF6600;
            color: white;
        }

        .age-badge.u20-yellow {
            background: #F8B323;
            color: white;
        }

        .age-badge.other {
            background: #E5E7EB;
            color: #6B7280;
        }

        .table-footer {
            margin: 12px 40px 10px;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 10px;
        }

        .kpi-card {
            background: linear-gradient(180deg, #ffffff 0%, #f7f9fc 100%);
            border: 1px solid #d7dee8;
            border-radius: 8px;
            padding: 10px 12px;
            box-shadow: 0 1px 3px rgba(4, 30, 66, 0.06);
        }

        .kpi-label {
            display: block;
            color: #6B7280;
            font-size: 10px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.04em;
            margin-bottom: 4px;
        }

        .kpi-value {
            color: var(--ewe-dark-blue);
            font-size: 18px;
            font-weight: 700;
            line-height: 1.2;
        }

        .kpi-value.small {
            font-size: 16px;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.5);
            z-index: 2000;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .modal.active {
            display: flex;
        }

            border-radius: 8px;
            max-width: 900px;
            width: 100%;
            max-height: 85vh;
            overflow-y: auto;
        }

            background: var(--ewe-dark-blue);
            color: var(--ewe-white);
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .modal-header h2 {
            font-size: 20px;
            font-weight: 700;
        }

        .modal-close {
            background: none;
            border: none;
            color: var(--ewe-white);
            font-size: 24px;
            cursor: pointer;
        }

        .modal-body {
            padding: 24px;
        }

            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(100px, 1fr));
            gap: 12px;
            margin-bottom: 24px;
        }

        .summary-item {
            background: var(--ewe-bg-light);
            padding: 12px;
            border-radius: 4px;
            text-align: center;
        }

            display: block;
            color: var(--ewe-dark-blue);
            font-size: 16px;
            margin-bottom: 4px;
        }

        .summary-label {
            font-size: 10px;
            color: #6B7280;
            text-transform: uppercase;
        }

            background: var(--ewe-bg-light);
            padding: 16px;
            text-align: center;
            color: #6B7280;
            font-size: 11px;
            border-top: 1px solid var(--ewe-border);
        }

        @media (max-width: 1200px) {
            .container {
                grid-template-columns: 1fr;
            }
            .panel {
                border-right: none;
                border-bottom: 1px solid var(--ewe-border);
                max-height: 50%;
            }
            .map-container {

            }
            .park-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        @media (max-width: 768px) {
            header {
                padding: 20px 16px;
            }
            h1 {
                font-size: 20px;
            }
            .tabs {
                padding: 0 20px;
            }
            .park-grid {
                grid-template-columns: 1fr;
            }
            .table-toolbar, .table-container, .table-footer {
                margin: 0 20px;
            }

            .search-box,
            .filter-select,
            .toolbar-button {
                width: 100%;
                max-width: 100%;
            }
        }
    </style>
</head>

                        <th data-col="8" style="text-align: right;">Leistung (MW)</th>
                    </tr>
                </thead>
                <tbody id="tableBody"></tbody>
            </table>
        </div>
    </div>

            <div class="modal-header">

                <button class="modal-close" onclick="closeModal()">&times;</button>
            </div>
            <div class="modal-body" id="modalBody"></div>
        </div>
    </div>

    <footer>

                const option = document.createElement('option');
                option.value = String(v);
                option.textContent = String(v);
                select.appendChild(option);
            });
        }

        function matchesPowerRange(value, range) {
            if (!range) return true;
            if (typeof value !== 'number' || value <= 0) return false;
            if (range === 'lt1') return value < 1;
            if (range === '1to3') return value >= 1 && value < 3;
            if (range === '3to5') return value >= 3 && value < 5;
            if (range === 'gte5') return value >= 5;
            return true;
        }

        function normalizeText(value) {
            return String(value || '')
                .toLowerCase()
                .normalize('NFD')
                .replace(/[\u0300-\u036f]/g, '');
        }

        function sortFilteredAnlagen() {
            if (sortCol < 0) return;
            const keys = ['tender', 'park', 'wea_id', 'mastr_id', 'anlagentyp', 'dso', 'tso', 'age_group', 'leistung_mw'];
            filteredAnlagen.sort((a, b) => {
                const aVal = a[keys[sortCol]], bVal = b[keys[sortCol]];
                if (typeof aVal === 'number' && typeof bVal === 'number') return sortAsc ? aVal - bVal : bVal - aVal;
                return sortAsc ? String(aVal).localeCompare(String(bVal), 'de') : String(bVal).localeCompare(String(aVal), 'de');
            });
        }

        function applyTableFilters() {
            filteredAnlagen = allAnlagen.filter(a => {
                const searchableText = normalizeText([
                    a.tender,
                    a.park,
                    a.wea_id,
                    a.mastr_id,
                    a.anlagentyp,
                    a.dso,
                    a.tso,
                    a.age_group
                ].join(' '));

                const searchTokens = tableFilters.search ? tableFilters.search.split(/\s+/).filter(Boolean) : [];
                const searchMatch = searchTokens.length === 0 || searchTokens.every(token => searchableText.includes(token));

                const tenderMatch = !tableFilters.tender || a.tender === tableFilters.tender;
                const tsoMatch = !tableFilters.tso || a.tso === tableFilters.tso;
                const dsoMatch = !tableFilters.dso || a.dso === tableFilters.dso;
                const ageMatch = !tableFilters.age || a.age_group === tableFilters.age;
                const powerMatch = matchesPowerRange(a.leistung_mw, tableFilters.power);

                return searchMatch && tenderMatch && tsoMatch && dsoMatch && ageMatch && powerMatch;
            });

            sortFilteredAnlagen();
            renderTable();
        }

        function initTableControls() {
            if (tableControlsInitialized) return;

            fillSelectOptions('tenderFilter', getUniqueValues('tender'), 'Alle Tender');
            fillSelectOptions('tsoFilter', getUniqueValues('tso'), 'Alle TSO');
            fillSelectOptions('dsoFilter', getUniqueValues('dso'), 'Alle DSO');
            fillSelectOptions('ageFilter', getUniqueValues('age_group'), 'Alle 20+-Gruppen');

            const searchInput = document.getElementById('searchInput');
            const onSearchChange = (e) => {
                tableFilters.search = normalizeText(e.target.value.trim());
                applyTableFilters();
            };
            searchInput.addEventListener('input', onSearchChange);
            searchInput.addEventListener('search', onSearchChange);

            document.getElementById('tenderFilter').addEventListener('change', (e) => {
                tableFilters.tender = e.target.value;
                applyTableFilters();
            });

            document.getElementById('tsoFilter').addEventListener('change', (e) => {
                tableFilters.tso = e.target.value;
                applyTableFilters();
            });

            document.getElementById('dsoFilter').addEventListener('change', (e) => {
                tableFilters.dso = e.target.value;
                applyTableFilters();
            });

            document.getElementById('ageFilter').addEventListener('change', (e) => {
                tableFilters.age = e.target.value;
                applyTableFilters();
            });

            document.getElementById('powerFilter').addEventListener('change', (e) => {
                tableFilters.power = e.target.value;
                applyTableFilters();
            });

            document.getElementById('resetFilters').addEventListener('click', () => {
                tableFilters.search = '';
                tableFilters.tender = '';
                tableFilters.tso = '';
                tableFilters.dso = '';
                tableFilters.age = '';
                tableFilters.power = '';

                document.getElementById('searchInput').value = '';
                document.getElementById('tenderFilter').value = '';
                document.getElementById('tsoFilter').value = '';
                document.getElementById('dsoFilter').value = '';
                document.getElementById('ageFilter').value = '';
                document.getElementById('powerFilter').value = '';

                applyTableFilters();
            });

            tableControlsInitialized = true;
        }

        function renderTable() {
            const tbody = document.getElementById('tableBody');
            let totalMW = 0;
            const rows = [];

            filteredAnlagen.forEach(a => {
                const ageGroup = a.age_group && a.age_group !== '-' ? a.age_group : '–';
                let badgeClass = 'age-badge other';
                let rowClass = '';

                if (ageGroup !== '–' && ageGroup.includes('Ü20')) {
                    const yearMatch = ageGroup.match(/Ü20-(\d{4})/);
                    if (yearMatch) {
                        const year = parseInt(yearMatch[1]);
                        if (year >= 2020 && year <= 2026) {
                            badgeClass = 'age-badge u20-orange';
                        } else if (year === 2027) {
                            badgeClass = 'age-badge u20-yellow';
                            rowClass = 'u20-2027-row';
                        }
                    }
                }

                const ageBadge = ageGroup !== '–' ? `<span class="${badgeClass}">${ageGroup}</span>` : '–';
                const mw = a.leistung_mw > 0 ? a.leistung_mw.toFixed(2) : '–';
                totalMW += (a.leistung_mw > 0 ? a.leistung_mw : 0);

                rows.push(`
                    <tr class="${rowClass}">
                        <td>${a.tender}</td>
                        <td>${a.park}</td>
                        <td><strong>${a.wea_id}</strong></td>
                        <td><span class="mastr-id">${a.mastr_id}</span></td>
                        <td>${a.anlagentyp}</td>
                        <td>${a.dso}</td>
                        <td>${a.tso}</td>
                        <td>${ageBadge}</td>
                        <td style="text-align: right;"><strong>${mw}</strong></td>
                    </tr>
                `);
            });

            tbody.innerHTML = rows.join('');

            document.getElementById('tableFooter').innerHTML = `
                <div class="kpi-card">
                    <span class="kpi-label">Anlagen</span>
                    <span class="kpi-value">${filteredAnlagen.length}</span>
                </div>
                <div class="kpi-card">
                    <span class="kpi-label">Gesamtleistung</span>
                    <span class="kpi-value small">${totalMW.toFixed(2)} MW</span>
                </div>
                <div class="kpi-card">
                    <span class="kpi-label">Ø Leistung je Anlage</span>
                    <span class="kpi-value small">${filteredAnlagen.length > 0 ? (totalMW / filteredAnlagen.length).toFixed(2) : 0} MW</span>
                </div>
            `;
        }

        document.querySelectorAll('th[data-col]').forEach(th => {
            th.addEventListener('click', function() {
                const col = parseInt(this.dataset.col);
                if (sortCol === col) sortAsc = !sortAsc;
                else { sortCol = col; sortAsc = true; }

                sortFilteredAnlagen();
                renderTable();
            });
        });

        function initMap() {
            map = L.map('map', {
                maxBounds: germanyBounds.pad(0.25),
                maxBoundsViscosity: 1.0,
                minZoom: 5
            }).setView([51.2, 10.4], 6);
            L.tileLayer('https://tile.openstreetmap.de/tiles/osmde/{z}/{x}/{y}.png', {
                attribution: '&copy; OpenStreetMap',
                maxZoom: 18
            }).addTo(map);

            map.fitBounds(germanyBounds, { padding: [16, 16], maxZoom: 7 });
        }

        function createPinSvg(color) {
            return `<svg width="32" height="44" viewBox="0 0 32 44" xmlns="http://www.w3.org/2000/svg"><defs><filter id="shadow"><feDropShadow dx="0" dy="1" stdDeviation="2" flood-opacity="0.3"/></filter></defs><path d="M16 0C8.27 0 2 6.27 2 14c0 10 14 30 14 30s14-20 14-30c0-7.73-6.27-14-14-14z" fill="${color}" stroke="white" stroke-width="1.5" filter="url(#shadow)"/><circle cx="16" cy="13" r="5" fill="white"/></svg>`;
        }

        function createMarkerIcon(tender, parkName, isHighlighted = false) {
            const baseColor = tenderColors[tender] || '#041E42';
            const markerColor = isHighlighted ? '#F8B323' : baseColor;
            const pinSvg = createPinSvg(markerColor);

            return L.divIcon({
                className: 'custom-marker-icon',
                html: `<div onclick="selectPark('${tender}', '${parkName}')" style="cursor: pointer;">${pinSvg}</div>`,
                iconSize: [32, 44],
                iconAnchor: [16, 44]
            });
        }

        function setMarkerHighlight(parkName, isHighlighted) {
            const entry = markerByPark.get(parkName);
            if (!entry) return;
            if (entry.highlighted === isHighlighted) return;

            entry.marker.setIcon(createMarkerIcon(entry.tender, parkName, isHighlighted));
            entry.highlighted = isHighlighted;
        }

        function scheduleMapResize() {
            if (!map) return;
            clearTimeout(mapResizeTimeout);
            clearTimeout(mapResizeIdleTimeout);
            mapResizeTimeout = setTimeout(() => {
                forceMapResize();
            }, 80);

            // One final pass after resize settles to avoid half-width tile viewport glitches.
            mapResizeIdleTimeout = setTimeout(() => {
                forceMapResize();
            }, 320);
        }

        function syncMapHostSize() {
            const mapHost = document.querySelector('.map-container');
            const mapElement = document.getElementById('map');
            if (!mapHost || !mapElement) return;

            const hostWidth = mapHost.clientWidth;
            const hostHeight = mapHost.clientHeight;
            if (hostWidth > 0) mapElement.style.width = `${hostWidth}px`;
            if (hostHeight > 0) mapElement.style.height = `${hostHeight}px`;
        }

        function forceMapResize() {
            if (!map) return;

            syncMapHostSize();

            map.invalidateSize(false);
            requestAnimationFrame(() => {
                syncMapHostSize();
                map.invalidateSize(false);
                setTimeout(() => {
                    syncMapHostSize();
                    map.invalidateSize(false);
                }, 140);
            });
        }

        function setupMapResizeHandling() {
            window.addEventListener('resize', scheduleMapResize);

            if (typeof ResizeObserver !== 'undefined') {
                const mapContainer = document.querySelector('.map-container');
                if (mapContainer) {
                    resizeObserver = new ResizeObserver(() => scheduleMapResize());
                    resizeObserver.observe(mapContainer);
                }
            }
        }

        function attachStableHoverPopup(marker) {
            let closeTimer;
            const closeDelayMs = 140;

            const scheduleClose = () => {
                clearTimeout(closeTimer);
                closeTimer = setTimeout(() => {
                    const popupEl = marker.getPopup()?.getElement();
                    if (popupEl && popupEl.matches(':hover')) return;
                    marker.closePopup();
                }, closeDelayMs);
            };

            marker.on('mouseover', () => {
                clearTimeout(closeTimer);
                marker.openPopup();
            });

            marker.on('mouseout', () => {
                scheduleClose();
            });

            marker.on('popupopen', () => {
                const popupEl = marker.getPopup()?.getElement();
                if (!popupEl || popupEl.dataset.hoverBound === '1') return;

                popupEl.dataset.hoverBound = '1';
                popupEl.addEventListener('mouseenter', () => {
                    clearTimeout(closeTimer);
                });
                popupEl.addEventListener('mouseleave', () => {
                    scheduleClose();
                });
            });
        }

        function showTender(tender) {
            document.querySelectorAll('.tender-tab').forEach(t => t.classList.remove('active'));
            document.querySelector(`.tender-tab[data-tender="${tender}"]`)?.classList.add('active');

            markers.forEach(m => map.removeLayer(m));
            markers = [];
            markerByPark = new Map();
            const markerPositions = [];

            const tenderData = portfolioData.tenders[tender];
            for (const [parkName, parkData] of Object.entries(tenderData.parks)) {
                const lat = Number(parkData.lat);
                const lon = Number(parkData.lon);
                if (!Number.isFinite(lat) || !Number.isFinite(lon)) continue;
                if (lat < -90 || lat > 90 || lon < -180 || lon > 180) continue;

                const marker = L.marker([lat, lon], {
                    icon: createMarkerIcon(tender, parkName)
                }).bindPopup(`<strong>${parkName}</strong><br/>${parkData.anzahl} Anlagen, ${parkData.leistung_mw.toFixed(1)} MW<br/>TSO: ${parkData.tso} | DSO: ${parkData.dso}`, {
                    autoClose: false,
                    closeButton: false,
                    closeOnClick: false,
                    offset: [0, -26]
                });
                attachStableHoverPopup(marker);
                marker.addTo(map);
                markers.push(marker);
                markerByPark.set(parkName, { marker, tender, highlighted: false });
                markerPositions.push([lat, lon]);
            }

            const grid = document.getElementById('parkGrid');
            grid.innerHTML = '';
            Object.entries(tenderData.parks).forEach(([parkName, parkData]) => {
                const card = document.createElement('div');
                card.className = 'park-card';
                card.addEventListener('mouseenter', () => setMarkerHighlight(parkName, true));
                card.addEventListener('mouseleave', () => setMarkerHighlight(parkName, false));
                card.addEventListener('focus', () => setMarkerHighlight(parkName, true));
                card.addEventListener('blur', () => setMarkerHighlight(parkName, false));
                card.onclick = () => {
                    const modal = document.getElementById('detailModal');
                    document.getElementById('modalTitle').textContent = parkName;
                    let html = `<div class="summary-box"><div class="summary-item"><strong>${parkData.anzahl}</strong><span class="summary-label">Anlagen</span></div><div class="summary-item"><strong>${parkData.leistung_mw.toFixed(2)}</strong><span class="summary-label">MW</span></div><div class="summary-item"><strong>${parkData.tso}</strong><span class="summary-label">TSO</span></div><div class="summary-item"><strong>${parkData.dso}</strong><span class="summary-label">DSO</span></div></div><table><tr><th>WEA-ID</th><th>MaStR-ID</th><th>Typ</th><th>DSO</th><th>20+-Gruppe</th><th>Leistung</th></tr>`;
                    parkData.anlagen.forEach(a => {
                        const mw = a.leistung_mw > 0 ? a.leistung_mw.toFixed(2) : '–';
                        const ag = a.age_group || '–';
                        let bc = 'age-badge other';
                        let rc = '';
                        if (ag !== '–' && ag.includes('Ü20')) {
                            const ym = ag.match(/Ü20-(\d{4})/);
                            if (ym && ym[1] >= 2020 && ym[1] <= 2026) bc = 'age-badge u20-orange';
                            else if (ym && ym[1] == 2027) { bc = 'age-badge u20-yellow'; rc = 'u20-2027-row'; }
                        }
                        html += `<tr class="${rc}"><td><strong>${a.wea_id}</strong></td><td><span class="mastr-id">${a.mastr_id}</span></td><td>${a.anlagentyp}</td><td>${a.dso}</td><td><span class="${bc}">${ag}</span></td><td>${mw}</td></tr>`;
                    });
                    html += '</table>';
                    document.getElementById('modalBody').innerHTML = html;
                    modal.classList.add('active');
                };
                card.innerHTML = `<div class="park-name">${parkName}</div><div class="park-meta"><div class="park-meta-item">📍 ${parkData.anzahl}</div><div class="park-meta-item">⚡ ${parkData.leistung_mw.toFixed(1)}</div><div style="grid-column: 1/-1;"><span class="tso-badge">${parkData.tso}</span></div></div>`;
                grid.appendChild(card);
            });

            if (markerPositions.length > 0) {
                const markerBounds = L.latLngBounds(markerPositions);
                const latSpan = markerBounds.getNorth() - markerBounds.getSouth();
                const lonSpan = markerBounds.getEast() - markerBounds.getWest();

                if (markerBounds.isValid() && latSpan <= 15 && lonSpan <= 20) {
                    map.fitBounds(markerBounds.pad(0.2), { padding: [18, 18], maxZoom: 10 });
                } else {
                    map.fitBounds(germanyBounds, { padding: [16, 16], maxZoom: 7 });
                }
            } else {
                map.fitBounds(germanyBounds, { padding: [16, 16], maxZoom: 7 });
            }
        }

        function selectPark(tender, parkName) {
            showTender(tender);
        }

        function closeModal() {
            document.getElementById('detailModal').classList.remove('active');
        }

        document.getElementById('detailModal').addEventListener('click', (e) => {
            if (e.target.id === 'detailModal') closeModal();
        });

        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') closeModal();
        });

        initTableControls();
        applyTableFilters();
        tableRendered = true;

        initMap();
        setupMapResizeHandling();
        forceMapResize();
        const tabsContainer = document.getElementById('tenderTabs');
        Object.keys(portfolioData.tenders).forEach(tender => {
            const tab = document.createElement('button');
            tab.className = 'tender-tab';
            tab.dataset.tender = tender;
            tab.textContent = tender;
            tab.onclick = () => showTender(tender);
            tabsContainer.appendChild(tab);
        });

        showTender(Object.keys(portfolioData.tenders)[0]);
    </script>
</body>
</html>
