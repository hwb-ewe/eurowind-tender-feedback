<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tender Material Viewer - DE DV_2027</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');

        :root {
            --ewe-dark-blue: #041E42;
            --ewe-sky-blue: #ABCAF6;
            --ewe-white: #FFFFFF;
            --ewe-bg-light: #F9FAFB;
            --ewe-border: #E5E7EB;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            line-height: 1.6;
            color: #374151;
            background: var(--ewe-white);
        }

        header {
            background: var(--ewe-dark-blue);
            color: var(--ewe-white);
            padding: 28px 24px;
            text-align: center;
        }

        h1 {
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 4px;
        }

        .subtitle {
            font-size: 15px;
            opacity: 0.9;
        }

        .tabs {
            display: flex;
            background: var(--ewe-bg-light);
            border-bottom: 2px solid var(--ewe-border);
            padding: 0 40px;
        }

        .tab-button {
            padding: 16px 24px;
            border: none;
            background: none;
            color: #6B7280;
            font-weight: 600;
            cursor: pointer;
            border-bottom: 3px solid transparent;
            transition: all 0.2s;
        }

        .tab-button:hover {
            color: var(--ewe-dark-blue);
        }

        .tab-button.active {
            color: var(--ewe-dark-blue);
            border-bottom-color: var(--ewe-dark-blue);
        }

        .tab-content {
            display: none;
            flex: 1;
            overflow: hidden;
        }

        .tab-content.active {
            display: flex;
            width: 100%;
        }

        .container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 0;
            min-height: calc(100vh - 140px);
            width: 100%;
            flex: 1 1 auto;
            min-width: 0;
        }

        .panel {
            display: flex;
            flex-direction: column;
            overflow: hidden;
            border-right: 1px solid var(--ewe-border);
        }

        .map-container {
            flex: 1;
            overflow: hidden;
            min-width: 0;
            position: relative;
        }

        #map {
            width: 100%;
            height: 100%;
            display: block;
        }

        .custom-marker-icon {
            background: transparent;
            border: none;
        }

        .panel-header {
            padding: 20px;
            background: var(--ewe-bg-light);
            border-bottom: 2px solid var(--ewe-border);
        }

        .tender-tabs {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .tender-tab {
            padding: 8px 12px;
            border: 1px solid var(--ewe-border);
            background: var(--ewe-white);
            color: #374151;
            border-radius: 4px;
            cursor: pointer;
            font-size: 12px;
            font-weight: 600;
            transition: all 0.2s;
        }

        .tender-tab.active {
            background: var(--ewe-dark-blue);
            color: var(--ewe-white);
            border-color: var(--ewe-dark-blue);
        }

        .panel-content {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
        }

        .park-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
        }

        .park-card {
            background: var(--ewe-white);
            border: 1px solid var(--ewe-border);
            border-radius: 6px;
            padding: 12px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .park-card:hover {
            border-color: var(--ewe-dark-blue);
            box-shadow: 0 2px 8px rgba(4, 30, 66, 0.1);
            background: var(--ewe-bg-light);
        }

        .park-name {
            font-size: 13px;
            font-weight: 600;
            color: var(--ewe-dark-blue);
            margin-bottom: 6px;
        }

        .park-meta {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
            font-size: 11px;
            color: #6B7280;
        }

        .tso-badge {
            display: inline-block;
            background: var(--ewe-sky-blue);
            color: var(--ewe-dark-blue);
            padding: 3px 6px;
            border-radius: 2px;
            font-size: 10px;
            font-weight: 600;
        }

        .table-view {
            flex-direction: column;
            width: 100%;
            min-height: calc(100vh - 140px);
        }

        .table-toolbar {
            padding: 16px 40px;
            background: var(--ewe-bg-light);
            border-bottom: 1px solid var(--ewe-border);
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 30;
        }

        .search-box {
            flex: 1;
            padding: 10px 12px;
            border: 1px solid var(--ewe-border);
            border-radius: 4px;
            font-size: 13px;
            max-width: 400px;
        }

        .filter-select {
            padding: 10px 12px;
            border: 1px solid var(--ewe-border);
            border-radius: 4px;
            font-size: 13px;
            background: var(--ewe-white);
            color: #374151;
            min-width: 170px;
        }

        .toolbar-button {
            padding: 10px 14px;
            border: 1px solid var(--ewe-dark-blue);
            background: var(--ewe-white);
            color: var(--ewe-dark-blue);
            border-radius: 4px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        .toolbar-button:hover {
            background: var(--ewe-dark-blue);
            color: var(--ewe-white);
        }

        .table-container {
            flex: 1;
            overflow: auto;
            margin: 0 40px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 11px;
        }

        th {
            background: var(--ewe-dark-blue);
            color: var(--ewe-white);
            padding: 10px;
            text-align: left;
            font-weight: 600;
            position: sticky;
            top: 0;
            cursor: pointer;
            user-select: none;
        }

        th:hover {
            background: #0a2d52;
        }

        td {
            padding: 8px 10px;
            border-bottom: 1px solid var(--ewe-border);
        }

        tr:hover {
            background: var(--ewe-bg-light);
        }

        tr.u20-2027-row {
            background: #fffbf0;
            border-left: 3px solid #F8B323;
        }

        .mastr-id {
            font-family: 'Courier New', monospace;
            background: var(--ewe-bg-light);
            padding: 2px 4px;
            border-radius: 2px;
            font-size: 9px;
        }

        .age-badge {
            display: inline-block;
            padding: 3px 6px;
            border-radius: 2px;
            font-size: 9px;
            font-weight: 600;
        }

        .age-badge.u20-orange {
            background: #FF6600;
            color: white;
        }

        .age-badge.u20-yellow {
            background: #F8B323;
            color: white;
        }

        .age-badge.other {
            background: #E5E7EB;
            color: #6B7280;
        }

        .table-footer {
            margin: 12px 40px 10px;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 10px;
        }

        .kpi-card {
            background: linear-gradient(180deg, #ffffff 0%, #f7f9fc 100%);
            border: 1px solid #d7dee8;
            border-radius: 8px;
            padding: 10px 12px;
            box-shadow: 0 1px 3px rgba(4, 30, 66, 0.06);
        }

        .kpi-label {
            display: block;
            color: #6B7280;
            font-size: 10px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.04em;
            margin-bottom: 4px;
        }

        .kpi-value {
            color: var(--ewe-dark-blue);
            font-size: 18px;
            font-weight: 700;
            line-height: 1.2;
        }

        .kpi-value.small {
            font-size: 16px;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.5);
            z-index: 2000;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: var(--ewe-white);
            border-radius: 8px;
            max-width: 900px;
            width: 100%;
            max-height: 85vh;
            overflow-y: auto;
        }

        .modal-header {
            background: var(--ewe-dark-blue);
            color: var(--ewe-white);
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 10px;
        }

        .modal-header h2 {
            font-size: 20px;
            font-weight: 700;
        }

        .modal-actions {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .copy-assets-btn {
            background: #ffffff;
            color: var(--ewe-dark-blue);
            border: 1px solid #dbe3f1;
            border-radius: 4px;
            padding: 8px 10px;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
        }

        .copy-assets-btn:hover {
            background: #edf3ff;
        }

        .modal-close {
            background: none;
            border: none;
            color: var(--ewe-white);
            font-size: 24px;
            cursor: pointer;
        }

        .modal-body {
            padding: 24px;
        }

        .summary-box {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(100px, 1fr));
            gap: 12px;
            margin-bottom: 24px;
        }

        .summary-item {
            background: var(--ewe-bg-light);
            padding: 12px;
            border-radius: 4px;
            text-align: center;
        }

        .summary-item strong {
            display: block;
            color: var(--ewe-dark-blue);
            font-size: 16px;
            margin-bottom: 4px;
        }

        .summary-label {
            font-size: 10px;
            color: #6B7280;
            text-transform: uppercase;
        }

        footer {
            background: var(--ewe-bg-light);
            padding: 16px;
            text-align: center;
            color: #6B7280;
            font-size: 11px;
            border-top: 1px solid var(--ewe-border);
        }

        @media (max-width: 1200px) {
            .container {
                grid-template-columns: 1fr;
            }
            .panel {
                border-right: none;
                border-bottom: 1px solid var(--ewe-border);
                max-height: 50%;
            }
            .map-container {
                order: -1;
            }
            .park-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        @media (max-width: 768px) {
            header {
                padding: 20px 16px;
            }
            h1 {
                font-size: 20px;
            }
            .tabs {
                padding: 0 20px;
            }
            .park-grid {
                grid-template-columns: 1fr;
            }
            .table-toolbar, .table-container, .table-footer {
                margin: 0 20px;
            }

            .search-box,
            .filter-select,
            .toolbar-button {
                width: 100%;
                max-width: 100%;
            }
        }
    </style>
</head>
<body>
    <header>
        <h1>Eurowind DE - Tender Material Viewer</h1>
        <p class="subtitle">DE DV 2027 - UPDATE 15.07.2026 15:30 MESZ</p>
    </header>

    <div class="tabs">
        <button class="tab-button active" data-tab="map">🗺️ Karte & Parks</button>
        <button class="tab-button" data-tab="table">📊 Alle Anlagen</button>
    </div>

    <div id="map-tab" class="tab-content active">
        <div class="container">
            <div class="panel">
                <div class="panel-header">
                    <div class="tender-tabs" id="tenderTabs"></div>
                </div>
                <div class="panel-content">
                    <div class="park-grid" id="parkGrid"></div>
                </div>
            </div>
            <div class="map-container">
                <div id="map"></div>
            </div>
        </div>
    </div>

    <div id="table-tab" class="tab-content table-view">
        <div class="table-toolbar">
            <input type="text" id="searchInput" class="search-box" placeholder="Suche nach Wind farm name, OEM Serial Number, MaStR-ID, Park, DSO...">
            <select id="tenderFilter" class="filter-select">
                <option value="">Alle Tender</option>
            </select>
            <select id="dvConstructFilter" class="filter-select">
                <option value="">Alle DV-Konstrukte</option>
            </select>
            <select id="tsoFilter" class="filter-select">
                <option value="">Alle TSO</option>
            </select>
            <select id="dsoFilter" class="filter-select">
                <option value="">Alle DSO</option>
            </select>
            <select id="ageFilter" class="filter-select">
                <option value="">Alle 20+-Gruppen</option>
            </select>
            <select id="powerFilter" class="filter-select">
                <option value="">Alle Leistungsbereiche</option>
                <option value="lt1">&lt; 1 MW</option>
                <option value="1to3">1 bis 3 MW</option>
                <option value="3to5">3 bis 5 MW</option>
                <option value="gte5">≥ 5 MW</option>
            </select>
            <button id="resetFilters" class="toolbar-button" type="button">Filter zurücksetzen</button>
        </div>
        <div class="table-footer" id="tableFooter"></div>
        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th data-col="0">Tender</th>
                        <th data-col="1">DV-Konstrukt</th>
                        <th data-col="2">Park</th>
                        <th data-col="3">Wind farm name</th>
                        <th data-col="4">OEM Serial Number</th>
                        <th data-col="5">MaStR-ID</th>
                        <th data-col="6">Typ</th>
                        <th data-col="7">DSO</th>
                        <th data-col="8">TSO</th>
                        <th data-col="9">20+-Gruppe</th>
                        <th data-col="10" style="text-align: right;">Leistung (MW)</th>
                    </tr>
                </thead>
                <tbody id="tableBody"></tbody>
            </table>
        </div>
    </div>

    <div class="modal" id="detailModal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modalTitle">Park</h2>
                <div class="modal-actions">
                    <button id="copyAssetsBtn" class="copy-assets-btn" type="button" onclick="copyCurrentParkAssets()">Copy assets</button>
                    <button class="modal-close" onclick="closeModal()">&times;</button>
                </div>
            </div>
            <div class="modal-body" id="modalBody"></div>
        </div>
    </div>

    <footer>
        <p><strong>Eurowind Energy</strong> | Direktvermarktungstender DE DV 2027 | hwb@euruowindenergy.com | Juli 2026</p>
    </footer>

        function matchesPowerRange(value, range) {
            if (!range) return true;
            if (typeof value !== 'number' || value <= 0) return false;
            if (range === 'lt1') return value < 1;
            if (range === '1to3') return value >= 1 && value < 3;
            if (range === '3to5') return value >= 3 && value < 5;
            if (range === 'gte5') return value >= 5;
            return true;

        function attachStableHoverPopup(marker) {
            let closeTimer;
            const closeDelayMs = 140;

            const scheduleClose = () => {
                clearTimeout(closeTimer);
                closeTimer = setTimeout(() => {
                    const popupEl = marker.getPopup()?.getElement();
                    if (popupEl && popupEl.matches(':hover')) return;
                    marker.closePopup();
                }, closeDelayMs);
            };

            marker.on('mouseover', () => {
                clearTimeout(closeTimer);
                marker.openPopup();
            });

            marker.on('mouseout', () => {
                scheduleClose();
            });

            marker.on('popupopen', () => {
                const popupEl = marker.getPopup()?.getElement();
                if (!popupEl || popupEl.dataset.hoverBound === '1') return;

                popupEl.dataset.hoverBound = '1';
                popupEl.addEventListener('mouseenter', () => {
                    clearTimeout(closeTimer);
                });
                popupEl.addEventListener('mouseleave', () => {
                    scheduleClose();
                });
            });
        }

                const lon = Number(parkData.lon);
                if (!Number.isFinite(lat) || !Number.isFinite(lon)) continue;
                if (lat < -90 || lat > 90 || lon < -180 || lon > 180) continue;

                const marker = L.marker([lat, lon], {
                    icon: createMarkerIcon(tender, parkName)
                }).bindPopup(`<strong>${parkName}</strong><br/>${parkData.anzahl} Anlagen, ${parkData.leistung_mw.toFixed(1)} MW<br/>TSO: ${parkData.tso} | DSO: ${parkData.dso}`, {
                    autoClose: false,
                    closeButton: false,
                    closeOnClick: false,
                    offset: [0, -26]
                });
                attachStableHoverPopup(marker);
                marker.addTo(map);
                markers.push(marker);
                markerByPark.set(parkName, { marker, tender, highlighted: false });
                markerPositions.push([lat, lon]);
            }

            const grid = document.getElementById('parkGrid');
            grid.innerHTML = '';
            Object.entries(tenderData.parks).forEach(([parkName, parkData]) => {
                const card = document.createElement('div');
                card.className = 'park-card';
                card.addEventListener('mouseenter', () => setMarkerHighlight(parkName, true));
                card.addEventListener('mouseleave', () => setMarkerHighlight(parkName, false));
                card.addEventListener('focus', () => setMarkerHighlight(parkName, true));
                card.addEventListener('blur', () => setMarkerHighlight(parkName, false));
                card.onclick = () => {
                    const modal = document.getElementById('detailModal');
                    document.getElementById('modalTitle').textContent = parkName;
                    currentParkName = parkName;
                    currentParkData = parkData;
                    let html = `<div class="summary-box"><div class="summary-item"><strong>${parkData.anzahl}</strong><span class="summary-label">Anlagen</span></div><div class="summary-item"><strong>${parkData.leistung_mw.toFixed(2)}</strong><span class="summary-label">MW</span></div><div class="summary-item"><strong>${parkData.tso}</strong><span class="summary-label">TSO</span></div><div class="summary-item"><strong>${parkData.dso}</strong><span class="summary-label">DSO</span></div></div><table><tr><th>OEM Serial Number</th><th>Wind farm name</th><th>MaStR-ID</th><th>Typ</th><th>DSO</th><th>20+-Gruppe</th><th>Leistung</th></tr>`;
                    parkData.anlagen.forEach(a => {
                        const mw = a.leistung_mw > 0 ? a.leistung_mw.toFixed(2) : '–';
                        const ag = a.age_group || '–';
                        let bc = 'age-badge other';
                        let rc = '';
                        if (ag !== '–' && ag.includes('Ü20')) {
                            const ym = ag.match(/Ü20-(\d{4})/);
                            if (ym && ym[1] >= 2020 && ym[1] <= 2026) bc = 'age-badge u20-orange';
                            else if (ym && ym[1] == 2027) { bc = 'age-badge u20-yellow'; rc = 'u20-2027-row'; }
                        }
                        html += `<tr class="${rc}"><td><strong>${a.wea_id}</strong></td><td>${a.wind_farm_name || '–'}</td><td>${renderMaStRCell(a.mastr_id, a.mastr_detail_id)}</td><td>${a.anlagentyp}</td><td>${a.dso}</td><td><span class="${bc}">${ag}</span></td><td>${mw}</td></tr>`;
                    });
                    html += '</table>';
                    document.getElementById('modalBody').innerHTML = html;
                    modal.classList.add('active');
                };
                card.innerHTML = `<div class="park-name">${parkName}</div><div class="park-meta"><div class="park-meta-item">📍 ${parkData.anzahl}</div><div class="park-meta-item">⚡ ${parkData.leistung_mw.toFixed(1)}</div><div style="grid-column: 1/-1;"><span class="tso-badge">${parkData.tso}</span></div></div>`;
                grid.appendChild(card);
            });

            if (markerPositions.length > 0) {
                const markerBounds = L.latLngBounds(markerPositions);
                const latSpan = markerBounds.getNorth() - markerBounds.getSouth();
                const lonSpan = markerBounds.getEast() - markerBounds.getWest();

                if (markerBounds.isValid() && latSpan <= 15 && lonSpan <= 20) {
                    map.fitBounds(markerBounds.pad(0.2), { padding: [18, 18], maxZoom: 10 });
                } else {
                    map.fitBounds(germanyBounds, { padding: [16, 16], maxZoom: 7 });
                }
            } else {
                map.fitBounds(germanyBounds, { padding: [16, 16], maxZoom: 7 });
            }
        }

        function selectPark(tender, parkName) {
            showTender(tender);
        }

        function escapeHtml(value) {
            return String(value ?? '')
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#39;');
        }

        function buildAssetsExport(parkName, parkData) {
            const rows = (parkData?.anlagen || []).map(a => {
                const mw = a.leistung_mw > 0 ? Number(a.leistung_mw).toFixed(2) : '–';
                const ag = a.age_group || '–';
                return {
                    wea_id: a.wea_id ?? '',
                    wind_farm_name: a.wind_farm_name ?? '',
                    mastr_id: a.mastr_id ?? '',
                    mastr_detail_id: a.mastr_detail_id ?? '',
                    anlagentyp: a.anlagentyp ?? '',
                    oem: a.oem ?? '',
                    dso: a.dso ?? '',
                    tso: a.tso ?? '',
                    age_group: ag,
                    leistung_mw: mw
                };
            });

            const headers = ['OEM Serial Number', 'Wind farm name', 'MaStR-ID', 'Typ', 'OEM', 'DSO', 'TSO', '20+-Gruppe', 'Leistung (MW)'];

            const tableStyle = 'border-collapse:collapse;width:100%;max-width:1300px;';
            const captionStyle = 'caption-side:top;text-align:left;font-size:18px;font-weight:700;color:#041E42;padding-bottom:12px;';
            const headerCellStyle = 'border:none;border-bottom:2px solid #041E42;background:transparent;padding:12px 8px;text-align:left;font-size:15px;font-weight:700;color:#041E42;';
            const cellStyle = 'padding:8px 5px;font-size:13px;color:black;';

            const htmlRows = rows.map((row, index) => {
                const mastrLabel = escapeHtml(row.mastr_id);
                const mastrUrl = buildMastrDetailUrl(row.mastr_detail_id);
                const mastrCell = mastrUrl
                    ? `<a href="${escapeHtml(mastrUrl)}" target="_blank" rel="noopener noreferrer" style="color:#041E42;text-decoration:underline;">${mastrLabel}</a>`
                    : mastrLabel;
                const rowStyle = index % 2 === 0
                    ? 'background:#F5F9FF;border-bottom:1px solid #ABCAF6;'
                    : 'background:#FFFFFF;border-bottom:1px solid #ABCAF6;';

                return `
                    <tr style="${rowStyle}">
                        <td style="${cellStyle}">${escapeHtml(row.wea_id)}</td>
                        <td style="${cellStyle}">${escapeHtml(row.wind_farm_name)}</td>
                        <td style="${cellStyle}">${mastrCell}</td>
                        <td style="${cellStyle}">${escapeHtml(row.anlagentyp)}</td>
                        <td style="${cellStyle}">${escapeHtml(row.oem)}</td>
                        <td style="${cellStyle}">${escapeHtml(row.dso)}</td>
                        <td style="${cellStyle}">${escapeHtml(row.tso)}</td>
                        <td style="${cellStyle}">${escapeHtml(row.age_group)}</td>
                        <td style="${cellStyle}">${escapeHtml(row.leistung_mw)}</td>
                    </tr>
                `;
            }).join('');

            const html = `
                <table style="${tableStyle}">
                    <caption style="${captionStyle}">Eurowind DE Assets - ${escapeHtml(parkName)}</caption>
                    <thead>
                        <tr>${headers.map(h => `<th style="${headerCellStyle}">${escapeHtml(h)}</th>`).join('')}</tr>
                    </thead>
                    <tbody>${htmlRows}</tbody>
                </table>
            `.trim();

            const plain = [
                `Eurowind DE Assets - ${parkName}`,
                headers.join('\t'),
                ...rows.map(row => [
                    row.wea_id,
                    row.wind_farm_name,
                    row.mastr_id,
                    row.anlagentyp,
                    row.oem,
                    row.dso,
                    row.tso,
                    row.age_group,
                    row.leistung_mw
                ].join('\t'))
            ].join('\n');

            return { html, plain };
        }

        async function copyCurrentParkAssets() {
            if (!currentParkData || !currentParkName) {
                alert('Bitte zuerst einen Park öffnen.');
                return;
            }

            const { html, plain } = buildAssetsExport(currentParkName, currentParkData);
            try {
                if (window.ClipboardItem && navigator.clipboard?.write) {
                    const item = new ClipboardItem({
                        'text/html': new Blob([html], { type: 'text/html' }),
                        'text/plain': new Blob([plain], { type: 'text/plain' })
                    });
                    await navigator.clipboard.write([item]);
                } else if (navigator.clipboard?.writeText) {
                    await navigator.clipboard.writeText(plain);
                } else {
                    throw new Error('Clipboard API not available');
                }

                const btn = document.getElementById('copyAssetsBtn');
                if (btn) {
                    const original = btn.textContent;
                    btn.textContent = 'Copied';
                    setTimeout(() => {
                        btn.textContent = original;
                    }, 1200);
                }
            } catch (err) {
                alert('Kopieren fehlgeschlagen. Bitte Browser-Berechtigungen prüfen.');
            }
        }

        function closeModal() {
            document.getElementById('detailModal').classList.remove('active');
        }

        document.getElementById('detailModal').addEventListener('click', (e) => {
            if (e.target.id === 'detailModal') closeModal();
        });

        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') closeModal();
        });

        initTableControls();
        applyTableFilters();
        tableRendered = true;

        initMap();
        setupMapResizeHandling();
        forceMapResize();
        const tabsContainer = document.getElementById('tenderTabs');
        Object.keys(portfolioData.tenders).forEach(tender => {
            const tab = document.createElement('button');
            tab.className = 'tender-tab';
            tab.dataset.tender = tender;
            tab.textContent = tender;
            tab.onclick = () => showTender(tender);
            tabsContainer.appendChild(tab);
        });

        showTender(Object.keys(portfolioData.tenders)[0]);
    </script>
</body>
</html>
