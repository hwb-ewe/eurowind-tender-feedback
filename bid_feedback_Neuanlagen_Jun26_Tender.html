<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eurowind DE - Tender Feedback Tool 2026</title>
    <style>
        :root {
            --ewe-dark-blue: #041E42;
            --ewe-sky-blue: #ABCAF6;
            --ewe-white: #FFFFFF;
            --ewe-green: #49D69D;
            --ewe-yellow: #F8B323;
            --ewe-red: #E03E57;
            --font-primary: 'Century Gothic', 'Segoe UI', sans-serif;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: var(--font-primary);
            background: linear-gradient(135deg, var(--ewe-dark-blue) 0%, rgba(4, 30, 66, 0.85) 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1800px;
            margin: 0 auto;
            background: white;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow: hidden;
        }

        .header {
            background: var(--ewe-dark-blue);
            color: var(--ewe-white);
            padding: 40px;
            text-align: center;
            position: relative;
            min-height: 120px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .logo-placeholder {
            position: absolute;
            top: 20px;
            right: 30px;
            font-size: 12px;
            color: rgba(255, 255, 255, 0.6);
            font-weight: 600;
            letter-spacing: 1px;
        }

        .header h1 {
            font-size: 28px;
            margin-bottom: 8px;
        }

        .header p {
            font-size: 14px;
            opacity: 0.9;
        }

        .content {
            padding: 40px;
        }

        .trader-selector {
            margin-bottom: 40px;
        }

        .trader-selector label {
            display: block;
            margin-bottom: 12px;
            font-weight: 600;
            color: #333;
        }

        .trader-buttons {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        .trader-btn {
            padding: 10px 16px;
            border: 2px solid #ddd;
            background: white;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 13px;
            font-weight: 500;
            color: #333;
            position: relative;
        }

        .trader-btn .product-badge {
            display: block;
            font-size: 11px;
            color: #666;
            font-weight: 400;
            margin-top: 2px;
            opacity: 0.8;
        }

        .trader-btn:hover {
            border-color: var(--ewe-dark-blue);
            background: #f0f4f8;
        }

        .trader-btn.active {
            background: var(--ewe-dark-blue);
            color: var(--ewe-white);
            border-color: var(--ewe-dark-blue);
        }

        .trader-overview {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }

        .stat-card {
            background: #f8fafb;
            border-left: 4px solid var(--ewe-dark-blue);
            padding: 20px;
            border-radius: 8px;
        }

        .stat-card h3 {
            font-size: 12px;
            color: #555;
            text-transform: uppercase;
            margin-bottom: 8px;
            font-weight: 600;
        }

        .stat-card .value {
            font-size: 28px;
            font-weight: 700;
            color: var(--ewe-dark-blue);
        }

        .stat-card .unit {
            font-size: 14px;
            color: #999;
            margin-left: 4px;
        }

        .stat-card .subtext {
            font-size: 13px;
            color: #999;
            margin-top: 8px;
        }

        .product-label {
            display: inline-block;
            background: var(--ewe-sky-blue);
            color: var(--ewe-dark-blue);
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 700;
            margin-top: 12px;
        }

        .projects-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }

        .projects-table thead {
            background: #f8f9fa;
            border-bottom: 2px solid #ddd;
        }

        .projects-table th {
            padding: 16px;
            text-align: left;
            font-weight: 600;
            color: #333;
            font-size: 13px;
        }

        .projects-table td {
            padding: 16px;
            border-bottom: 1px solid #eee;
        }

        .projects-table tbody tr:hover {
            background: #f8f9fa;
        }

        .project-name {
            font-weight: 500;
            color: #333;
            max-width: 300px;
        }

        .bid-value {
            font-weight: 600;
            color: var(--ewe-dark-blue);
        }

        .delta-cell {
            position: relative;
        }

        .delta-bar {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .delta-bar-fill {
            height: 24px;
            border-radius: 4px;
            position: relative;
            min-width: 100px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 12px;
            font-weight: 600;
        }

        .delta-value {
            font-weight: 600;
            min-width: 50px;
            text-align: right;
        }

        .rank {
            background: #f0f0f0;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 12px;
            font-weight: 600;
            color: #666;
        }

        .na {
            color: #999;
            font-style: italic;
        }

        .view-toggle {
            display: flex;
            gap: 12px;
            margin-bottom: 30px;
            border-bottom: 2px solid #eee;
            padding-bottom: 20px;
        }

        .view-btn {
            padding: 10px 20px;
            border: none;
            background: transparent;
            border-bottom: 3px solid transparent;
            cursor: pointer;
            font-weight: 600;
            color: #999;
            transition: all 0.3s ease;
        }

        .view-btn.active {
            color: var(--ewe-dark-blue);
            border-bottom-color: var(--ewe-dark-blue);
        }

        .view {
            display: none;
        }

        .view.active {
            display: block;
        }

        .comparison-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
        }

        .trader-card {
            border: 1px solid #ddd;
            border-radius: 8px;
            padding: 20px;
            background: #fafbfc;
        }

        .trader-card h3 {
            font-size: 14px;
            font-weight: 700;
            margin-bottom: 12px;
            color: #333;
        }

        .trader-card-stat {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            font-size: 13px;
            border-bottom: 1px solid #eee;
        }

        .trader-card-stat:last-child {
            border-bottom: none;
        }

        .trader-card-stat label {
            color: #666;
        }

        .trader-card-stat value {
            font-weight: 600;
            color: #333;
        }

        .kpi-section {
            margin-top: 16px;
            padding-top: 12px;
            border-top: 2px solid var(--ewe-sky-blue);
        }

        .kpi-badges {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 8px;
        }

        .kpi-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 6px 12px;
            border-radius: 16px;
            font-size: 12px;
            font-weight: 600;
        }

        .kpi-excellent {
            background: rgba(73, 214, 157, 0.15);
            color: #1a5d3f;
        }

        .kpi-excellent.zero {
            background: rgba(137, 137, 137, 0.15);
            color: #666;
        }

        .kpi-good {
            background: rgba(111, 224, 184, 0.15);
            color: #0d5d3f;
        }

        .kpi-good.zero {
            background: rgba(137, 137, 137, 0.15);
            color: #666;
        }

        .kpi-perfect {
            background: var(--ewe-green);
            color: white;
        }

        .kpi-perfect.zero {
            background: #999;
            color: white;
        }

        .perfect-projects {
            margin-top: 12px;
            padding: 10px;
            background: rgba(73, 214, 157, 0.1);
            border-radius: 6px;
            border-left: 3px solid var(--ewe-green);
        }

        .perfect-projects-label {
            font-size: 11px;
            font-weight: 700;
            color: #333;
            text-transform: uppercase;
            margin-bottom: 6px;
        }

        .perfect-project-name {
            font-size: 12px;
            color: #1a5d3f;
            font-weight: 600;
            margin: 4px 0;
            padding-left: 4px;
        }

        .best-bid-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
        }

        .best-bid-card {
            border: 2px solid var(--ewe-green);
            border-radius: 8px;
            padding: 24px;
            background: linear-gradient(135deg, rgba(73, 214, 157, 0.05) 0%, rgba(73, 214, 157, 0) 100%);
        }

        .best-bid-card .project {
            font-size: 14px;
            font-weight: 700;
            color: #333;
            margin-bottom: 16px;
        }

        .best-bid-card .winner {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 12px;
        }

        .winner-badge {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 40px;
            height: 40px;
            background: var(--ewe-green);
            color: white;
            border-radius: 50%;
            font-weight: 700;
            font-size: 18px;
        }

        .winner-info {
            flex: 1;
        }

        .winner-info .trader-name {
            font-weight: 600;
            color: var(--ewe-dark-blue);
            font-size: 14px;
        }

        .winner-info .product-type {
            font-size: 12px;
            color: #999;
            margin-top: 2px;
        }

        .best-bid-value {
            display: flex;
            align-items: baseline;
            gap: 8px;
            margin-top: 12px;
            padding-top: 12px;
            border-top: 1px solid rgba(73, 214, 157, 0.2);
        }

        .best-bid-value .value {
            font-size: 24px;
            font-weight: 700;
            color: var(--ewe-green);
        }

        .best-bid-value .unit {
            font-size: 12px;
            color: #666;
        }

        .no-data {
            text-align: center;
            padding: 40px;
            color: #999;
        }

        .feedback-badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            margin-top: 8px;
        }

        .feedback-excellent {
            background: rgba(73, 214, 157, 0.2);
            color: #1a5d3f;
        }

        .feedback-good {
            background: rgba(171, 202, 246, 0.25);
            color: #0d2660;
        }

        .feedback-fair {
            background: rgba(248, 179, 35, 0.2);
            color: #5c4a00;
        }

        .feedback-poor {
            background: rgba(224, 62, 87, 0.15);
            color: #651a24;
        }

        @media (max-width: 768px) {
            .content {
                padding: 20px;
            }

            .trader-buttons {
                flex-direction: column;
            }

            .trader-btn {
                width: 100%;
            }

            .projects-table {
                font-size: 13px;
            }

            .projects-table th, .projects-table td {
                padding: 12px 8px;
            }

            .comparison-grid {
                grid-template-columns: 1fr;
            }

            .best-bid-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>

        function initTraderButtons() {
            const container = document.getElementById('traderButtons');
            [...data.traders].sort((a, b) => a.localeCompare(b)).forEach(trader => {
                const btn = document.createElement('button');
                btn.className = `trader-btn ${trader === selectedTrader ? 'active' : ''}`;
                const product = data.products && data.products[trader] ? data.products[trader] : '';
                btn.innerHTML = `${trader}${product ? `<span class="product-badge">${product}</span>` : ''}`;
                btn.onclick = () => selectTrader(trader);
                container.appendChild(btn);
            });
        }

        function selectTrader(trader) {
            selectedTrader = trader;
            document.querySelectorAll('.trader-btn').forEach(btn => {
                btn.classList.remove('active');
                if (btn.textContent.includes(trader)) btn.classList.add('active');
            });
            switchView('detail');
        }

        function getColorClass(delta) {
            if (delta === null || delta === '' || delta === '--') return 'feedback-fair';
            if (delta <= 0.2) return 'feedback-excellent';
            if (delta <= 0.5) return 'feedback-good';
            if (delta <= 1) return 'feedback-fair';
            return 'feedback-poor';
        }

        function getFeedbackText(delta) {
            if (delta === null || delta === '' || delta === '--') return '⚠️ Kein Gebot';
            if (delta <= 0.2) return '🏆 Hervorragend';
            if (delta <= 0.5) return '✅ Gut';
            if (delta <= 1) return '⚠️ Mittelmäßig';
            return '❌ Schwach';
        }

        function getColorGradient(delta) {
            if (delta === null || delta === '' || delta === '--') return '#ddd';
            if (delta <= 0.2) return '#49D69D'; // Green - Excellent
            if (delta <= 0.5) return '#6FE0B8'; // Light Green - Good
            if (delta <= 1) return '#F8B323'; // Yellow - Fair
            return '#E03E57'; // Red - Poor
        }

        function updateDetailView() {
            const stats = calculateTraderStats(selectedTrader);
            const product = data.products && data.products[selectedTrader] ? data.products[selectedTrader] : 'Unknown';

            const statsHtml = `
                <div class="stat-card">
                    <h3>Produkttyp</h3>
                    <div class="product-label">${product}</div>
                </div>
                <div class="stat-card">
                    <h3>Ø Delta zum Best Bid</h3>
                    <div class="value">${stats.avgDelta.toFixed(2)}<span class="unit">€</span></div>
                </div>
                <div class="stat-card">
                    <h3>Kleinstes Delta</h3>
                    <div class="value">${stats.bestDelta.toFixed(2)}<span class="unit">€</span></div>
                    <div class="subtext">bei ${stats.bestProject}</div>
                </div>
                <div class="stat-card">
                    <h3>Größtes Delta</h3>
                    <div class="value">${stats.worstDelta.toFixed(2)}<span class="unit">€</span></div>
                    <div class="subtext">bei ${stats.worstProject}</div>
                </div>
                <div class="stat-card">
                    <h3>Gebote abgegeben</h3>
                    <div class="value">${stats.bidCount}<span class="unit">/ 6</span></div>
                </div>
            `;
            document.getElementById('statsContainer').innerHTML = statsHtml;

            let projectsHtml = '';
            data.projects.forEach(project => {
                const bid = data.bids[project][selectedTrader];
                const delta = data.deltas[project][selectedTrader];
                const color = getColorGradient(delta);
                const feedback = getFeedbackText(delta);
                const feedbackClass = getColorClass(delta);
                const bidDisplay = bid === '--' || bid === null ? 'Kein Gebot' : bid + ' €/MWh';
                const deltaDisplay = delta === '' || delta === '--' || delta === null ? 'n/a' : delta.toFixed(2) + ' €';

                projectsHtml += `
                    <tr>
                        <td class="project-name">${project}</td>
                        <td class="bid-value">${bidDisplay}</td>
                        <td class="delta-cell">
                            <div class="delta-bar">
                                <div class="delta-bar-fill" style="background-color: ${color}; width: ${Math.min(delta / 6 * 100, 100)}%;">
                                    ${deltaDisplay}
                                </div>
                                <div class="feedback-badge ${feedbackClass}">${feedback}</div>
                            </div>
                        </td>
                    </tr>
                `;
            });
            document.getElementById('projectsBody').innerHTML = projectsHtml;
        }

        function calculateTraderStats(trader) {
            const deltas = [];
            let bidCount = 0;
            data.projects.forEach(project => {
                const delta = data.deltas[project][trader];
                const bid = data.bids[project][trader];
                if (delta !== '' && delta !== '--' && delta !== null && bid !== '--' && bid !== null) {
                    deltas.push(delta);
                    bidCount++;
                }
            });
            const avgDelta = deltas.length > 0 ? deltas.reduce((a, b) => a + b, 0) / deltas.length : 0;
            const bestDelta = Math.min(...deltas);
            const worstDelta = Math.max(...deltas);
            let bestProject = '', worstProject = '';
            data.projects.forEach(project => {
                const delta = data.deltas[project][trader];
                if (delta === bestDelta) bestProject = project;
                if (delta === worstDelta) worstProject = project;
            });
            return { avgDelta, bestDelta, worstDelta, bestProject, worstProject, bidCount };
        }

        function calculateComparisonStats(trader) {
            let excellentCount = 0;
            let goodCount = 0;
            let perfectProjects = [];

            data.projects.forEach(project => {
                const delta = data.deltas[project][trader];
                const bid = data.bids[project][trader];

                if (delta !== '' && delta !== '--' && delta !== null && bid !== '--' && bid !== null) {
                    if (delta <= 0.2) excellentCount++;
                    if (delta <= 0.5) goodCount++;
                    if (delta === 0 || delta === 0.0) {
                        perfectProjects.push(project);
                    }
                }
            });

            return { excellentCount, goodCount, perfectProjects };
        }

        function updateComparisonView() {
            let html = '';
            [...data.traders].sort((a, b) => a.localeCompare(b)).forEach(trader => {
                const stats = calculateTraderStats(trader);
                const compStats = calculateComparisonStats(trader);
                const product = data.products && data.products[trader] ? data.products[trader] : 'Unknown';

                let perfectProjectsHtml = '';
                if (compStats.perfectProjects.length > 0) {
                    perfectProjectsHtml = `
                        <div class="perfect-projects">
                            <div class="perfect-projects-label">✓ Best Bid Projekte (Δ = 0€):</div>
                            ${compStats.perfectProjects.map(proj => `<div class="perfect-project-name">• ${proj}</div>`).join('')}
                        </div>
                    `;
                }

                html += `
                    <div class="trader-card">
                        <h3>${trader}</h3>
                        <div class="trader-card-stat">
                            <label>Produkt:</label>
                            <value>${product}</value>
                        </div>
                        <div class="trader-card-stat">
                            <label>Ø Delta:</label>
                            <value>${stats.avgDelta.toFixed(2)} €</value>
                        </div>
                        <div class="trader-card-stat">
                            <label>Kleinstes Delta:</label>
                            <value>${stats.bestDelta.toFixed(2)} €</value>
                        </div>
                        <div class="trader-card-stat">
                            <label>Größtes Delta:</label>
                            <value>${stats.worstDelta.toFixed(2)} €</value>
                        </div>
                        <div class="trader-card-stat">
                            <label>Gebote:</label>
                            <value>${stats.bidCount} / 6</value>
                        </div>

                        <div class="kpi-section">
                            <div style="font-size: 12px; font-weight: 600; color: #333; margin-bottom: 8px;">Performance KPIs</div>
                            <div class="kpi-badges">
                                <div class="kpi-badge kpi-excellent ${compStats.excellentCount === 0 ? 'zero' : ''}">
                                    <span>🏆</span>
                                    <span>Hervorragend: ${compStats.excellentCount}</span>
                                </div>
                                <div class="kpi-badge kpi-good ${compStats.goodCount === 0 ? 'zero' : ''}">
                                    <span>✅</span>
                                    <span>Gut: ${compStats.goodCount}</span>
                                </div>
                                <div class="kpi-badge kpi-perfect ${compStats.perfectProjects.length === 0 ? 'zero' : ''}">
                                    <span>⭐</span>
                                    <span>Best Bid: ${compStats.perfectProjects.length}</span>
                                </div>
                            </div>
                            ${perfectProjectsHtml}
                        </div>
                    </div>
                `;
            });
            document.getElementById('comparisonGrid').innerHTML = html;
        }

        function updateAllocationView() {
            let html = '';
            data.projects.forEach(project => {
                let bestBid = Infinity;
                let bestTrader = null;
                let bestProduct = '';

                data.traders.forEach(trader => {
                    const bid = data.bids[project][trader];
                    if (bid !== null && bid !== '--' && bid !== undefined) {
                        const bidValue = parseFloat(bid);
                        if (!isNaN(bidValue) && bidValue < bestBid) {
                            bestBid = bidValue;
                            bestTrader = trader;
                            bestProduct = data.products && data.products[trader] ? data.products[trader] : 'Unknown';
                        }
                    }
                });

                if (bestTrader) {
                    html += `
                        <div class="best-bid-card">
                            <div class="project">🎯 ${project}</div>
                            <div class="winner">
                                <div class="winner-badge">🏆</div>
                                <div class="winner-info">
                                    <div class="trader-name">${bestTrader}</div>
                                    <div class="product-type">${bestProduct}</div>
                                </div>
                            </div>
                            <div class="best-bid-value">
                                <div class="value">${bestBid.toFixed(2)}</div>
                                <div class="unit">€/MWh</div>
                            </div>
                        </div>
                    `;
                }
            });
            document.getElementById('bestBidGrid').innerHTML = html;
        }

        function switchView(view) {
            document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
            document.querySelectorAll('.view-btn').forEach(b => b.classList.remove('active'));

            if (view === 'detail') {
                document.getElementById('detailView').classList.add('active');
                document.querySelector('[onclick="switchView(\'detail\')"]').classList.add('active');
                updateDetailView();
            } else if (view === 'comparison') {
                document.getElementById('comparisonView').classList.add('active');
                document.querySelector('[onclick="switchView(\'comparison\')"]').classList.add('active');
                updateComparisonView();
            } else if (view === 'allocation') {
                document.getElementById('allocationView').classList.add('active');
                document.querySelector('[onclick="switchView(\'allocation\')"]').classList.add('active');
                updateAllocationView();
            }
        }

        // Initialize
        initTraderButtons();
        updateDetailView();
        updateComparisonView();
        updateAllocationView();
    </script>
</body>
</html>
